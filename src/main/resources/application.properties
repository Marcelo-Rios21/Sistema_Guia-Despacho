spring.application.name=sistema-guias-despacho

server.port=${PORT:8080}

# Conexion Oracle Autonomous Database con TLS
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:oracle.jdbc.OracleDriver}

# Configuracion JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# AWS S3
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET}

# Ruta temporal para guias generadas. En EC2 se reemplaza con APP_EFS_PATH=/mnt/efs/guias

# Ruta temporal para guias generadas. En EC2 se reemplaza con APP_EFS_PATH=/mnt/efs/guias
app.storage.efs-path=${APP_EFS_PATH:./efs/guias}
